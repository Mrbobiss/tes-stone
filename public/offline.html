<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>T’as Dormi ? • Hors ligne</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(180deg, #fff7fb 0%, #fffdfa 45%, #f7fbff 100%);
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #111827;
      }
      .card {
        max-width: 420px;
        background: rgba(255,255,255,0.88);
        border: 1px solid rgba(255,255,255,0.7);
        border-radius: 28px;
        padding: 28px;
        box-shadow: 0 20px 70px rgba(15, 23, 42, 0.08);
      }
      .pill {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 999px;
        background: #111827;
        color: white;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      h1 {
        margin: 16px 0 10px;
        font-size: 32px;
        line-height: 1.05;
      }
      p {
        margin: 0 0 12px;
        line-height: 1.6;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="pill">Mode hors ligne</span>
      <h1>T’as Dormi ?</h1>
      <p>L’interface déjà visitée reste dispo hors ligne, mais l’analyse selfie a besoin d’une connexion.</p>
      <p>Quand le réseau revient, recharge la page et relance le jugement.</p>
    </main>
  </body>
</html>
